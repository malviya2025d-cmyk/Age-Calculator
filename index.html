<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age App Pro+</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.card{
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  text-align:center;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:15px;
  line-height:1.6;
}

.dashboard{
  margin-top:15px;
  background:rgba(0,0,0,0.25);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔥 Age App Pro+</h2>

<input type="text" id="name" placeholder="Enter name">
<input type="date" id="dob">
<button onclick="saveData()">Calculate</button>

<div id="result"></div>

<div class="dashboard">
📊 Views: <span id="views">0</span>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, setDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAnalytics, logEvent } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRe2Q6i4Mi_W5ubX-EBXIIdiJ5-BFXpIY",
  authDomain: "ai-deep-9fb36.firebaseapp.com",
  projectId: "ai-deep-9fb36",
  storageBucket: "ai-deep-9fb36.firebasestorage.app",
  messagingSenderId: "123806685798",
  appId: "1:123806685798:web:51c03c98afd07122c2aba7",
  measurementId: "G-FB9B4RZFKJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const analytics = getAnalytics(app);

let interval;

/* 🔥 PAGE VIEW TRACK */
logEvent(analytics, 'page_view');

/* 🔥 VISITOR COUNTER */
async function increaseVisit(){
  const ref = doc(db,"siteStats","counter");
  const snap = await getDoc(ref);

  if(snap.exists()){
    await updateDoc(ref,{
      views: increment(1)
    });
  }else{
    await setDoc(ref,{
      views: 1
    });
  }

  loadVisits();
}

async function loadVisits(){
  const ref = doc(db,"siteStats","counter");
  const snap = await getDoc(ref);

  if(snap.exists()){
    document.getElementById("views").innerText = snap.data().views;
  }
}

increaseVisit();

/* 🔥 AGE CALC */
function calculateAge(dob){
  const birth = new Date(dob);
  const now = new Date();

  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();
  let seconds = Math.floor((now - birth)/1000);

  if(days < 0){
    months--;
    days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  return {years,months,days,seconds};
}

window.saveData = async function(){

  /* 🔥 CLICK TRACK */
  logEvent(analytics, 'calculate_click');

  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;

  if(!name || !dob){
    alert("Fill all fields");
    return;
  }

  clearInterval(interval);

  function update(){
    const age = calculateAge(dob);

    document.getElementById("result").innerHTML =
    `👤 ${name}<br><br>
     🎉 ${age.years} Years<br>
     📅 ${age.months} Months<br>
     ⏳ ${age.days} Days<br>
     ⏱ ${age.seconds} Seconds lived`;
  }

  update();
  interval = setInterval(update,1000);

  await addDoc(collection(db,"users"),{
    name:name,
    dob:dob
  });
}
</script>

</body>
</html>
