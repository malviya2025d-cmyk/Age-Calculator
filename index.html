<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age App Pro+</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.card{
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  text-align:center;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:15px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h2>🔥 Age App Pro+</h2>

<input type="text" id="name" placeholder="Enter name">
<input type="date" id="dob">
<button onclick="saveData()">Calculate</button>

<div id="result"></div>

</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRe2Q6i4Mi_W5ubX-EBXIIdiJ5-BFXpIY",
  authDomain: "ai-deep-9fb36.firebaseapp.com",
  projectId: "ai-deep-9fb36",
  storageBucket: "ai-deep-9fb36.firebasestorage.app",
  messagingSenderId: "123806685798",
  appId: "1:123806685798:web:51c03c98afd07122c2aba7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let interval;

// 🔥 FULL AGE CALC
function calculateAge(dob){
  const birth = new Date(dob);
  const now = new Date();

  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();
  let seconds = Math.floor((now - birth)/1000);

  if(days < 0){
    months--;
    days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  return {years,months,days,seconds};
}

// 🚀 MAIN FUNCTION
window.saveData = async function(){
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;

  if(!name || !dob){
    alert("Fill all fields");
    return;
  }

  clearInterval(interval);

  function update(){
    const age = calculateAge(dob);

    // 🎂 Next Birthday
    let now = new Date();
    let next = new Date(now.getFullYear(), new Date(dob).getMonth(), new Date(dob).getDate());
    if(next < now) next.setFullYear(now.getFullYear()+1);

    let diff = next - now;
    let daysLeft = Math.floor(diff/86400000);

    document.getElementById("result").innerHTML =
    `👤 ${name}<br><br>
     🎉 ${age.years} Years<br>
     📅 ${age.months} Months<br>
     ⏳ ${age.days} Days<br>
     ⏱ ${age.seconds} Seconds lived<br><br>
     🎂 Birthday in ${daysLeft} days`;
  }

  update();
  interval = setInterval(update,1000);

  // 💾 Save to Firebase
  const age = calculateAge(dob);
  await addDoc(collection(db,"users"),{
    name:name,
    dob:dob,
    years:age.years,
    months:age.months,
    days:age.days
  });
}
</script>

</body>
</html>
