<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age App Pro+</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.card{
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  text-align:center;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>🔥 Age App Pro+</h2>

<input type="text" id="name" placeholder="Enter name">
<input type="date" id="dob">
<button onclick="saveData()">Save & Calculate</button>

<div id="result"></div>
<div id="users"></div>

</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRe2Q6i4Mi_W5ubX-EBXIIdiJ5-BFXpIY",
  authDomain: "ai-deep-9fb36.firebaseapp.com",
  projectId: "ai-deep-9fb36",
  storageBucket: "ai-deep-9fb36.firebasestorage.app",
  messagingSenderId: "123806685798",
  appId: "1:123806685798:web:51c03c98afd07122c2aba7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 SAVE DATA
window.saveData = async function(){
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;

  if(!name || !dob){
    alert("Fill all fields");
    return;
  }

  const birth = new Date(dob);
  const now = new Date();
  const age = now.getFullYear() - birth.getFullYear();

  document.getElementById("result").innerHTML =
    `🎉 ${name}, your age is ${age}`;

  await addDoc(collection(db,"users"),{
    name:name,
    dob:dob,
    age:age,
    time:new Date()
  });

  loadUsers();
}

// 🔥 LOAD USERS
async function loadUsers(){
  const querySnapshot = await getDocs(collection(db,"users"));
  let html = "<h3>Users:</h3>";

  querySnapshot.forEach((doc)=>{
    let d = doc.data();
    html += `<p>${d.name} (${d.age})</p>`;
  });

  document.getElementById("users").innerHTML = html;
}

loadUsers();
</script>

</body>
</html>
