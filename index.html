<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCigq1eaGSsY6cqltkLW97xuP4eF0rdfIY",
    authDomain: "age-calculator-1ce36.firebaseapp.com",
    projectId: "age-calculator-1ce36",
    storageBucket: "age-calculator-1ce36.firebasestorage.app",
    messagingSenderId: "1072853945660",
    appId: "1:1072853945660:web:0d27f8318e86ba3ff2e239",
    measurementId: "G-7YP3E3EGMC"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ✅ WAIT FOR DOM LOAD
  window.addEventListener("DOMContentLoaded", () => {

    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");

    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => alert("Login Successful 🚀"))
        .catch((error) => alert(error.message));
    });

    signupBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("Account Created ✅"))
        .catch((error) => alert(error.message));
    });

  });

</script>
