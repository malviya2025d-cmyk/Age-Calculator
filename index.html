<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 MOBILE FIX (MOST IMPORTANT) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

/* 🔥 Responsive Card */
.card{
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  text-align:center;
  width:90%;
  max-width:350px;
}

/* Inputs */
input,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* Button */
button{
  background:#00c6ff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0072ff;
  transform:scale(1.05);
}

/* Result */
.result{
  margin-top:20px;
  font-size:18px;
}

/* 🔥 Mobile spacing fix */
@media(max-width:480px){
  body{
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="card">
  <h2>Age Calculator 🎂</h2>

  <input type="date" id="dob">
  <button onclick="calculateAge()">Calculate Age</button>

  <div class="result" id="result"></div>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRe2Q6i4Mi_W5ubX-EBXIIdiJ5-BFXpIY",
  authDomain: "ai-deep-9fb36.firebaseapp.com",
  projectId: "ai-deep-9fb36",
  storageBucket: "ai-deep-9fb36.firebasestorage.app",
  messagingSenderId: "123806685798",
  appId: "1:123806685798:web:51c03c98afd07122c2aba7",
  measurementId: "G-FB9B4RZFKJ"
};

initializeApp(firebaseConfig);
console.log("Firebase Connected ✅");
</script>

<!-- 🔥 Age Calculator -->
<script>
function calculateAge(){
  const dob = document.getElementById("dob").value;
  if(!dob){
    alert("Please select your date of birth");
    return;
  }

  const birthDate = new Date(dob);
  const today = new Date();

  let years = today.getFullYear() - birthDate.getFullYear();
  let months = today.getMonth() - birthDate.getMonth();
  let days = today.getDate() - birthDate.getDate();

  if(days < 0){
    months--;
    days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  document.getElementById("result").innerHTML = 
    `You are <b>${years}</b> years, <b>${months}</b> months, <b>${days}</b> days old 🎉`;
}
</script>

</body>
</html>
